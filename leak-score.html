<style>
/* ---- Revenue Leak Score quiz — page-scoped, on top of /styles.css brand tokens ---- */
.ls-stage{min-height:100vh;background:var(--charcoal);color:var(--white);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:104px 20px 64px}
.ls-stage::before{content:'';position:absolute;top:0;left:0;width:70%;height:80%;background:radial-gradient(ellipse at 30% 15%,rgba(13,148,136,0.14) 0%,transparent 60%);pointer-events:none}
.ls-card{position:relative;z-index:1;background:var(--white);color:var(--charcoal);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 12px 40px rgba(0,0,0,.35);width:100%;max-width:620px;padding:40px}
.ls-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;color:var(--amber);display:block;margin-bottom:16px}
.ls-card h1{font-size:clamp(1.9rem,4.4vw,2.5rem);line-height:1.12;margin-bottom:16px}
.ls-card .ls-sub{color:var(--medium);font-size:1.06rem;line-height:1.7;margin-bottom:24px}
.ls-meta{font-family:var(--mono);font-size:.74rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:18px}
.ls-feature{display:flex;align-items:flex-start;gap:10px;color:var(--medium);font-size:.96rem;margin:10px 0}
.ls-feature svg{flex:0 0 auto;width:18px;height:18px;color:var(--teal);margin-top:2px}

/* Buttons reuse .btn/.btn-primary from styles.css; full-width helper */
.ls-btn-block{width:100%;margin-top:8px}

/* ---- Setup steps + progress ---- */
.ls-steps{display:flex;gap:7px;margin-bottom:26px}
.ls-step-dot{height:5px;flex:1;border-radius:100px;background:var(--border);transition:background .3s}
.ls-step-dot.done{background:var(--teal)}
.ls-step-dot.active{background:var(--teal)}
.ls-q-label{font-family:var(--mono);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px}
.ls-card h2{font-size:clamp(1.3rem,3vw,1.65rem);line-height:1.25;margin-bottom:10px}
.ls-subtext{color:var(--medium);font-size:.95rem;line-height:1.6;margin-bottom:22px}

/* ---- Trade grid ---- */
.ls-trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ls-tile{display:flex;flex-direction:column;align-items:flex-start;gap:8px;min-height:44px;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:16px 14px;font-family:var(--font);font-size:.92rem;font-weight:600;color:var(--charcoal);text-align:left;cursor:pointer;transition:border-color .18s,background .18s,transform .12s}
.ls-tile .ico{font-size:1.5rem;line-height:1}
.ls-tile:hover{border-color:var(--teal);background:var(--white)}
.ls-tile:active{transform:scale(.98)}
.ls-tile.selected{border-color:var(--teal);background:var(--teal-subtle)}

/* ---- Answer options ---- */
.ls-options{display:flex;flex-direction:column;gap:10px}
.ls-option{display:flex;align-items:center;gap:13px;width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;font-family:var(--font);font-size:1rem;line-height:1.4;font-weight:500;color:var(--charcoal);text-align:left;cursor:pointer;transition:border-color .18s,background .18s,transform .12s;min-height:44px}
.ls-option:hover{border-color:var(--teal);background:var(--white)}
.ls-option:active{transform:scale(.99)}
.ls-option.selected{border-color:var(--teal);background:var(--teal-subtle)}
.ls-radio{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--border-strong,#D4CFC6);transition:border-color .18s}
.ls-option:hover .ls-radio,.ls-option.selected .ls-radio{border-color:var(--teal)}
.ls-option.selected .ls-radio{background:radial-gradient(circle,var(--teal) 0 44%,transparent 48%)}

/* ---- Audit header: progress + live counter ---- */
.ls-auditbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px}
.ls-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:.85rem;font-weight:600;color:var(--medium);padding:6px 2px;transition:color .18s;min-height:44px}
.ls-back:hover{color:var(--teal)}
.ls-back[hidden]{display:none}
.ls-counter{font-family:var(--mono);font-size:.7rem;font-weight:600;text-align:right;line-height:1.3;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.ls-counter .amt{font-size:1.15rem;color:var(--amber);display:block;letter-spacing:-.5px;text-transform:none;transition:transform .25s}
.ls-counter .amt.bump{transform:scale(1.12)}
.ls-counter.tallying{font-size:.78rem;text-transform:none;letter-spacing:.2px;font-weight:500;opacity:.8}
.ls-progress{height:6px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:6px}
.ls-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),#14b8a6);border-radius:100px;transition:width .35s cubic-bezier(.22,1,.36,1)}
.ls-progress-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:22px}

/* ---- "+$X · Stage" flash on stage completion (counter only ever climbs) ---- */
.ls-flash{position:fixed;left:50%;top:88px;transform:translateX(-50%);z-index:60;background:var(--charcoal-soft,#252A2E);color:#fff;border:1px solid rgba(217,119,6,.5);border-radius:100px;padding:8px 16px;font-family:var(--mono);font-size:.82rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);pointer-events:none;animation:lsFlash 1.5s cubic-bezier(.22,1,.36,1) forwards}
.ls-flash .amt{color:var(--amber)}
@keyframes lsFlash{0%{opacity:0;transform:translate(-50%,8px)}14%{opacity:1;transform:translate(-50%,0)}74%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-10px)}}

.ls-fade{animation:lsFade .45s cubic-bezier(.22,1,.36,1) both}
@keyframes lsFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:600px){
  .ls-stage{padding:92px 14px 48px}
  .ls-card{padding:26px 20px;border-radius:var(--radius-md)}
  .ls-trade-grid{grid-template-columns:repeat(2,1fr)}
  .ls-option{padding:15px 15px;font-size:.96rem}
  .ls-card h1{font-size:1.7rem}
}
@media(prefers-reduced-motion:reduce){.ls-fade,.ls-flash,.ls-counter .amt{animation:none;transition:none}}
</style>

<script src="/leak-score-engine.js"></script>
<script>
(function(){
  var LS = window.LeakScore;
  var card = document.getElementById('card');

  // ---- capture UTMs + attribution at the top of the funnel; carried to the
  //      results-page gate so the one write path logs where the lead came from ----
  var pageParams = new URLSearchParams(location.search);
  function utm(){
    var o={}; ['utm_source','utm_medium','utm_campaign','utm_term','utm_content'].forEach(function(k){
      var v=pageParams.get(k); if(v) o[k]=v;
    }); return o;
  }
  var startedAt = Date.now();
  var quizStarted = false;   // guard: GA4 quiz_start fires once per attempt

  var state = {
    screen: 'welcome',      // welcome | setup | audit
    setupStep: 0,           // 0 trade · 1 revenue · 2 team · 3 jobs
    trade: null,
    revenueIndex: null,
    teamIndex: null,
    jobsIndex: null,
    qIndex: 0,              // 0..11
    maxReached: 0,
    answers: {},            // { q1: optionIndex, ... }
    committed: {},          // { stageId: finalized stageLeak } — additive counter (spec §5)
    flashed: {}             // stageId -> already flashed "+$X"
  };

  var SETUP = [
    { key:'trade',  label:'About you · 1 of 4', q:'What kind of work do you do?',                       sub:'This sets the benchmarks we score you against.' },
    { key:'rev',    label:'About you · 2 of 4', q:'Roughly what does the business bring in a year?',     sub:'A ballpark is fine — it anchors the dollar math.' },
    { key:'team',   label:'About you · 3 of 4', q:'How many people work in the business, including you?',sub:'Helps us read your number against operators your size.' },
    { key:'jobs',   label:'About you · 4 of 4', q:'How many jobs or service visits per week?',           sub:'The last piece before we start the audit.' }
  ];

  var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var BACK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>';

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function track(name, params){ if(window.gtag) gtag('event', name, params||{}); }
  function stageOf(qId){ return LS.STAGES.filter(function(s){ return s.questionIds.indexOf(qId)!==-1; })[0]; }

  // ---- additive counter: a stage's leak is committed only once it's fully answered,
  //      then never re-touched on forward progress, so the number only climbs (§5) ----
  function recomputeCommitted(){
    if(state.trade==null || state.revenueIndex==null) return;
    var trade = LS.BUSINESS_TYPES.filter(function(t){return t.id===state.trade;})[0];
    var revenue = LS.REVENUE_OPTIONS[state.revenueIndex].value;
    LS.STAGES.forEach(function(stage){
      var complete = stage.questionIds.every(function(q){ return state.answers[q]!=null; });
      state.committed[stage.id] = complete ? LS.stageLeakFor(stage.id, state.answers, revenue, trade.category) : 0;
    });
  }
  function moneyFound(){
    return Object.keys(state.committed).reduce(function(a,k){ return a + (state.committed[k]||0); }, 0);
  }
  // The counter shows the SAME nearest-$100 rounding the results headline uses
  // (engine totalLeak), so the final climb reconciles exactly to the result (§5/§13).
  function moneyShown(){ return Math.round(moneyFound()/100)*100; }

  function announce(msg){ var s=document.getElementById('ls-status'); if(s) s.textContent=msg; }

  function render(){
    if(state.screen==='welcome') renderWelcome();
    else if(state.screen==='setup') renderSetup();
    else if(state.screen==='audit') renderAudit();
    afterRender();
  }
  function afterRender(){
    if(state.screen==='welcome') return;
    var h=card.querySelector('h1,h2');
    if(h){ h.setAttribute('tabindex','-1'); try{ h.focus({preventScroll:true}); }catch(_){ h.focus(); } }
    if(state.screen==='audit'){
      var lk=moneyShown();
      announce('Question '+(state.qIndex+1)+' of 12'+(lk>0?'. Money found so far '+LS.money(lk):''));
    }
  }

  function renderWelcome(){
    card.className='ls-card ls-fade';
    card.innerHTML =
      '<span class="ls-eyebrow">Revenue Leak Score</span>'+
      '<h1>Find your biggest <span style="color:var(--amber)">money leak</span>.</h1>'+
      '<p class="ls-sub">Missed calls, dead quotes, invoices that go out late — the money isn’t missing, it’s leaking. Answer a few quick questions and see exactly where yours is going, across the 8 stages of your business.</p>'+
      '<div>'+
        feature('A real dollar estimate of what’s leaking each year')+
        feature('Your #1 leak ranked — plus the first fix for each weak spot')+
        feature('A shareable scorecard, built for your trade')+
      '</div>'+
      '<button class="btn btn-primary ls-btn-block" id="start">Start my Leak Score →</button>'+
      '<p class="ls-meta">~3 min · works on your phone · free</p>';
    document.getElementById('start').onclick=function(){ if(!quizStarted){ quizStarted=true; track('quiz_start'); } track('leakscore_start'); state.screen='setup'; state.setupStep=0; render(); };
  }
  function feature(t){ return '<div class="ls-feature">'+CHECK+'<span>'+t+'</span></div>'; }

  function renderSetup(){
    card.className='ls-card ls-fade';
    var cfg = SETUP[state.setupStep];
    var dots = '<div class="ls-steps">'+[0,1,2,3].map(stepDot).join('')+'</div>';
    var backBtn = '<button class="ls-back" id="back">'+BACK+' Back</button>';
    var body;
    if(cfg.key==='trade'){
      body = '<div class="ls-trade-grid">'+
        LS.BUSINESS_TYPES.map(function(t){ var s=state.trade===t.id?' selected':''; return '<button class="ls-tile'+s+'" data-trade="'+t.id+'" aria-pressed="'+(s?'true':'false')+'"><span class="ico" aria-hidden="true">'+t.icon+'</span>'+esc(t.label)+'</button>'; }).join('')+
      '</div>';
    } else {
      var opts = cfg.key==='rev' ? LS.REVENUE_OPTIONS : cfg.key==='team' ? LS.TEAM_OPTIONS : LS.JOBS_OPTIONS;
      var sel  = cfg.key==='rev' ? state.revenueIndex : cfg.key==='team' ? state.teamIndex : state.jobsIndex;
      body = '<div class="ls-options">'+
        opts.map(function(o,i){ var s=sel===i?' selected':''; return '<button class="ls-option'+s+'" data-idx="'+i+'" aria-pressed="'+(s?'true':'false')+'"><span class="ls-radio"></span><span>'+esc(o.label)+'</span></button>'; }).join('')+
      '</div>';
    }
    card.innerHTML = dots +
      '<div class="ls-auditbar" style="margin-bottom:14px">'+backBtn+'<div></div></div>'+
      '<div class="ls-q-label">'+esc(cfg.label)+'</div>'+
      '<h2>'+esc(cfg.q)+'</h2>'+
      '<p class="ls-subtext">'+esc(cfg.sub)+'</p>'+ body;

    document.getElementById('back').onclick=function(){
      if(state.setupStep===0){ state.screen='welcome'; render(); }
      else { state.setupStep--; render(); }
    };
    if(cfg.key==='trade'){
      each('[data-trade]', function(b){ b.onclick=function(){ state.trade=b.getAttribute('data-trade'); nextSetup(); }; });
    } else {
      each('[data-idx]', function(b){ b.onclick=function(){
        var i=parseInt(b.getAttribute('data-idx'),10);
        if(cfg.key==='rev') state.revenueIndex=i; else if(cfg.key==='team') state.teamIndex=i; else state.jobsIndex=i;
        nextSetup();
      }; });
    }
  }
  function nextSetup(){
    if(state.setupStep < 3){ state.setupStep++; render(); }
    else { recomputeCommitted(); state.screen='audit'; state.qIndex=0; render(); }
  }
  function stepDot(i){
    var cls='ls-step-dot';
    if(state.screen==='audit') cls+=' done';
    else if(i<state.setupStep) cls+=' done';
    else if(i===state.setupStep) cls+=' active';
    return '<div class="'+cls+'"></div>';
  }

  function renderAudit(){
    var q = LS.AUDIT_QUESTIONS[state.qIndex];
    var n = state.qIndex+1, total = 12;
    var pct = Math.round((state.qIndex/total)*100);
    var lk = moneyShown();
    // Stage 1 spans Q1–Q2, so "money found" is legitimately $0 until a stage completes.
    // Show a neutral "tallying" state until the first real number lands (>$0), then reveal
    // it climbing — fixes the "dead $0" perception without touching the additive math.
    var counter = lk > 0
      ? '<div class="ls-counter" aria-hidden="true">Money found so far<span class="amt" id="moneyAmt">'+LS.money(lk)+'</span></div>'
      : '<div class="ls-counter tallying" aria-hidden="true">Tallying your leaks…</div>';
    card.className='ls-card ls-fade';
    card.innerHTML =
      '<div class="ls-progress"><div class="ls-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="ls-progress-meta"><span>Question '+n+' of '+total+'</span><span>'+pct+'%</span></div>'+
      '<div class="ls-auditbar"><button class="ls-back" id="back">'+BACK+' Back</button>'+counter+'</div>'+
      '<h2>'+esc(q.question)+'</h2>'+
      '<p class="ls-subtext">'+esc(q.subtext)+'</p>'+
      '<div class="ls-options">'+
        q.options.map(function(o,i){
          var sel = state.answers[q.id]===i ? ' selected':'';
          return '<button class="ls-option'+sel+'" data-opt="'+i+'" aria-pressed="'+(sel?'true':'false')+'"><span class="ls-radio"></span><span>'+esc(o.label)+'</span></button>';
        }).join('')+
      '</div>';
    document.getElementById('back').onclick=goBack;
    each('[data-opt]', function(b){
      b.onclick=function(){
        var i=parseInt(b.getAttribute('data-opt'),10);
        var prevShown=moneyShown();
        state.answers[q.id]=i;
        recomputeCommitted();
        var stage=stageOf(q.id);
        var nowComplete=stage.questionIds.every(function(x){ return state.answers[x]!=null; });
        var delta=moneyShown()-prevShown;   // change in the rounded, displayed total
        if(nowComplete && !state.flashed[stage.id]){
          state.flashed[stage.id]=true;
          if(delta>0) showFlash(delta, stage.label);
        }
        b.classList.add('selected');
        // tick the visible number up immediately (progress bar moves on the re-render)
        var amtEl=document.getElementById('moneyAmt');
        if(amtEl){ amtEl.textContent=LS.money(moneyShown()); if(delta>0){ amtEl.classList.add('bump'); } }
        setTimeout(advance, 210);
      };
    });
  }

  function showFlash(amt, label){
    var el=document.createElement('div');
    el.className='ls-flash';
    el.innerHTML='<span class="amt">+'+LS.money(amt)+'</span> · '+esc(label);
    document.body.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1550);
  }

  function goBack(){
    if(state.qIndex===0){ state.screen='setup'; state.setupStep=3; render(); }
    else { state.qIndex--; render(); }
  }
  function allAnswered(){ for(var i=1;i<=12;i++){ if(state.answers['q'+i]==null) return false; } return true; }
  function firstUnanswered(){ for(var i=0;i<12;i++){ if(state.answers['q'+(i+1)]==null) return i; } return 11; }
  function advance(){
    state.maxReached = Math.max(state.maxReached, state.qIndex);
    // Revisit: changed an earlier answer after going Back — jump to where they were.
    if(state.qIndex < state.maxReached){
      if(allAnswered()){ return finish(); }
      state.qIndex = firstUnanswered(); render(); return;
    }
    if(state.qIndex < 11){ state.qIndex++; render(); }
    else { finish(); }
  }

  function finish(){
    track('leakscore_complete', { trade: state.trade });
    track('quiz_complete', { trade: state.trade });
    var digits='';
    for(var i=0;i<12;i++){ digits += (state.answers['q'+(i+1)]!=null ? state.answers['q'+(i+1)] : 0); }
    var st = { trade:state.trade, revenueIndex:state.revenueIndex, teamIndex:state.teamIndex, jobsIndex:state.jobsIndex, answerDigits:digits };

    // Stash behaviour for the one write path (best-effort context — never gates the unlock).
    try{
      var behaviour = {
        utm: utm(),
        device: (window.innerWidth<=600?'mobile':'desktop'),
        referrer: document.referrer || '',
        time_to_complete_sec: Math.round((Date.now()-startedAt)/1000),
        last_question_reached: 12,
        ua: (navigator.userAgent||'').slice(0,180)
      };
      sessionStorage.setItem('ls_behaviour', JSON.stringify(behaviour));
    }catch(e){}

    location.assign('/leak-score/results'+LS.encodeState(st));
  }

  function each(sel, fn){ Array.prototype.forEach.call(card.querySelectorAll(sel), fn); }

  // Fixed nav: transparent over the dark stage, solid charcoal once scrolled.
  var nav=document.getElementById('nav');
  window.addEventListener('scroll',function(){ nav.classList.toggle('scrolled', window.scrollY>40); },{passive:true});

  render();
})();
</script>
<script>/* mobile nav toggle */(function(){var n=document.getElementById('nav'),t=document.getElementById('navToggle'),l=document.getElementById('navLinks');if(!t||!l)return;function close(){l.classList.remove('open');t.setAttribute('aria-expanded','false');if(n)n.classList.remove('menu-open');}t.addEventListener('click',function(){var o=l.classList.toggle('open');t.setAttribute('aria-expanded',o);if(n)n.classList.toggle('menu-open',o);});l.querySelectorAll('a').forEach(function(a){a.addEventListener('click',close);});document.addEventListener('keydown',function(e){if(e.key==='Escape'&&l.classList.contains('open')){close();t.focus();}});})();</script>
</body>
