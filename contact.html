<main class="page-body">

      <input type="hidden" name="redirect" value="https://theautobotics.com/thank-you.html">
      <!-- Honeypot — bots fill this, real users don't -->
      <input type="text" name="botcheck" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">

      <label for="name">Name</label>
      <input id="name" type="text" name="name" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit" class="btn btn-primary">Send message</button>
    </form>
  </div>
</main>

<script>
// Fixed nav: transparent over the dark hero, dark blur once scrolled
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>{nav.classList.toggle('scrolled',window.scrollY>40)},{passive:true});

// Scroll reveal animations
if('IntersectionObserver' in window){const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:.12,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('.reveal').forEach(el=>obs.observe(el))}else{document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'))}
</script>
