<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autobotics Operator's Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --teal: #0D9488;
      --teal-hover: #0B7C72;
      --teal-light: rgba(13, 148, 136, 0.08);
      --teal-border: rgba(13, 148, 136, 0.25);
      --teal-glow: rgba(13, 148, 136, 0.15);
      --amber: #D97706;
      --amber-light: #FFFBEB;
      --charcoal: #1C2024;
      --cream: #FAF7F2;
      --white: #FFFFFF;
      --medium: #5C6370;
      --muted: #9CA3AF;
      --border: #E8E2D9;
      --border-strong: #D4CFC6;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --red-glow: rgba(220, 38, 38, 0.12);
      --green: #16A34A;
      --green-light: #F0FDF4;
      --font-primary: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

      --shadow-xs: 0 1px 2px rgba(28, 32, 36, 0.04);
      --shadow-sm: 0 1px 3px rgba(28, 32, 36, 0.06), 0 1px 2px rgba(28, 32, 36, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(28, 32, 36, 0.07), 0 2px 4px -2px rgba(28, 32, 36, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(28, 32, 36, 0.08), 0 4px 6px -4px rgba(28, 32, 36, 0.04);
      --shadow-xl: 0 20px 25px -5px rgba(28, 32, 36, 0.08), 0 8px 10px -6px rgba(28, 32, 36, 0.04);
      --shadow-inner: inset 0 2px 4px rgba(28, 32, 36, 0.04);
      --shadow-card: 0 1px 3px rgba(28, 32, 36, 0.06), 0 1px 2px rgba(28, 32, 36, 0.04), 0 0 0 1px rgba(232, 226, 217, 0.7);
      --shadow-card-hover: 0 8px 16px -4px rgba(28, 32, 36, 0.08), 0 2px 6px rgba(28, 32, 36, 0.04), 0 0 0 1px rgba(13, 148, 136, 0.2);

      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --radius-full: 9999px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--font-primary);
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.12; }
    h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.25; }
    h3 { font-size: 17px; font-weight: 700; line-height: 1.35; letter-spacing: -0.2px; }
    small, .caption { font-size: 13px; color: var(--muted); }
    .mono { font-family: var(--font-mono); }

    #root { min-height: 100vh; background: var(--cream); }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    @media (min-width: 768px) {
      .container { padding: 32px 40px; }
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 20px;
      transition: box-shadow 0.3s var(--ease-out), transform 0.2s var(--ease-out);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      box-shadow: var(--shadow-card-hover);
      opacity: 0;
      transition: opacity 0.3s var(--ease-out);
      pointer-events: none;
    }

    .card:hover::before { opacity: 1; }

    .card-interactive { cursor: pointer; user-select: none; }

    .card-interactive:active {
      transform: scale(0.98);
      transition-duration: 0.1s;
    }

    /* ===== BUTTONS ===== */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-primary);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .button-primary {
      background: var(--teal);
      color: var(--white);
      width: 100%;
      height: 52px;
      font-size: 16px;
      border-radius: var(--radius-sm);
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25), 0 1px 2px rgba(13, 148, 136, 0.15);
      letter-spacing: -0.2px;
    }

    .button-primary:hover {
      background: var(--teal-hover);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3), 0 2px 4px rgba(13, 148, 136, 0.2);
      transform: translateY(-1px);
    }

    .button-primary:active {
      background: #097069;
      transform: translateY(0) scale(0.98);
      box-shadow: 0 1px 4px rgba(13, 148, 136, 0.2);
    }

    .button-secondary {
      background: var(--white);
      color: var(--teal);
      border: 2px solid var(--teal);
    }

    .button-secondary:active {
      background: var(--teal-light);
      transform: scale(0.98);
    }

    .button-small {
      padding: 8px 14px;
      font-size: 13px;
      height: auto;
    }

    /* ===== ANIMATIONS ===== */
    .fade-in { animation: fadeIn 0.4s var(--ease-out) both; }
    .fade-in-delay-1 { animation: fadeIn 0.4s var(--ease-out) 0.1s both; }
    .fade-in-delay-2 { animation: fadeIn 0.4s var(--ease-out) 0.2s both; }
    .fade-in-delay-3 { animation: fadeIn 0.4s var(--ease-out) 0.3s both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in { animation: slideIn 0.35s var(--ease-out) both; }

    @keyframes slideIn {
      from { transform: translateX(24px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes scaleReveal {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.03); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(16px) scale(0.9); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes barGrow {
      from { width: 0; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
      50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.1); }
    }

    @keyframes shimmer {
      from { background-position: -200% 0; }
      to { background-position: 200% 0; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes flashIn {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      30% { transform: translate(-50%, -50%) scale(0.97); }
      40% { transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== WELCOME SCREEN ===== */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .wordmark-auto { color: var(--charcoal); }
    .wordmark-botics { color: var(--teal); }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--charcoal);
      color: var(--white);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .welcome-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: breathe 2s ease-in-out infinite;
    }

    .welcome-headline {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    @media (max-width: 500px) {
      .welcome-headline { font-size: 30px; letter-spacing: -0.6px; }
    }

    .welcome-subline {
      font-size: 16px;
      color: var(--medium);
      margin-bottom: 40px;
      line-height: 1.65;
      max-width: 440px;
    }

    .features-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 400px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-xs);
      transition: all 0.2s var(--ease-out);
    }

    .feature-item:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--teal-border);
    }

    .feature-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-xs);
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon {
      width: 18px;
      height: 18px;
      color: var(--teal);
    }

    .feature-text {
      font-size: 14px;
      color: var(--charcoal);
      font-weight: 600;
    }

    .welcome-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      letter-spacing: 0.2px;
    }

    /* ===== SETUP SCREEN ===== */
    .setup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-top: 8px;
    }

    .back-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      transition: background 0.15s;
      color: var(--charcoal);
    }

    .back-button:active { background: var(--teal-light); }

    .progress-steps {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.35s var(--ease-spring);
    }

    .step-dot.active {
      background: var(--teal);
      width: 28px;
      border-radius: var(--radius-xs);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    .step-dot.completed {
      background: var(--teal);
    }

    .setup-eyebrow {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .setup-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    .business-types-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (min-width: 500px) {
      .business-types-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .type-card {
      padding: 18px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 100px;
      justify-content: center;
      box-shadow: var(--shadow-xs);
    }

    .type-card:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-md);
    }

    .type-card:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.97);
    }

    .type-card-icon {
      width: 28px;
      height: 28px;
      color: var(--teal);
    }

    .type-card-label {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--charcoal);
    }

    .option-button {
      width: 100%;
      padding: 16px 20px;
      text-align: left;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
      margin-bottom: 12px;
      font-family: var(--font-primary);
      box-shadow: var(--shadow-xs);
      color: var(--charcoal);
    }

    .option-button:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-sm);
    }

    .option-button:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.985);
    }

    /* ===== AUDIT SCREEN ===== */
    .audit-container { display: flex; flex-direction: column; }

    .audit-header {
      position: sticky;
      top: 0;
      background: linear-gradient(to bottom, var(--cream) 85%, transparent);
      padding: 16px 0 24px;
      z-index: 10;
    }

    .counter {
      background: linear-gradient(135deg, #F59E0B, var(--amber));
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 14px;
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(217, 119, 6, 0.2);
      transition: all 0.5s var(--ease-out);
    }

    .counter.critical {
      background: linear-gradient(135deg, #EF4444, var(--red));
      box-shadow: 0 2px 12px rgba(220, 38, 38, 0.25);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .counter-left { display: flex; flex-direction: column; }

    .counter-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.85;
    }

    .counter-amount {
      font-size: 28px;
      font-weight: 800;
      font-family: var(--font-mono);
      letter-spacing: -0.5px;
      transition: all 0.3s var(--ease-out);
    }

    .counter-icon {
      width: 32px;
      height: 32px;
      opacity: 0.7;
    }

    .counter-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--red);
      color: var(--white);
      padding: 14px 24px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 14px;
      font-family: var(--font-mono);
      z-index: 100;
      pointer-events: none;
      animation: flashIn 2.2s var(--ease-out) forwards;
      box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3);
    }

    .progress-bar-container { margin-bottom: 12px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), #14B8A6);
      transition: width 0.4s var(--ease-out);
      border-radius: var(--radius-full);
    }

    .stage-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
      margin-bottom: 20px;
      padding: 6px 12px;
      background: var(--teal-light);
      border-radius: var(--radius-full);
      border: 1px solid var(--teal-border);
    }

    .stage-chip-icon {
      width: 14px;
      height: 14px;
    }

    .question-container { animation: slideIn 0.3s var(--ease-out); }

    .question-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
      letter-spacing: -0.4px;
    }

    .question-subtext {
      font-size: 14px;
      font-style: italic;
      color: var(--medium);
      margin-bottom: 28px;
      line-height: 1.65;
      padding-left: 14px;
      border-left: 3px solid var(--amber);
    }

    .answer-option {
      padding: 16px 18px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.15s var(--ease-out);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 56px;
      display: flex;
      align-items: center;
      font-family: var(--font-primary);
      color: var(--charcoal);
      font-weight: 500;
      box-shadow: var(--shadow-xs);
    }

    .answer-option:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-sm);
    }

    .answer-option:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.985);
      transition-duration: 0.08s;
    }

    .audit-nav {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .nav-button {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      font-family: var(--font-primary);
      font-weight: 600;
      font-size: 14px;
      color: var(--medium);
      transition: all 0.2s;
    }

    .nav-button:disabled { opacity: 0.4; cursor: not-allowed; }

    .nav-button:active:not(:disabled) {
      background: var(--teal-light);
      border-color: var(--teal);
    }

    /* ===== RESULTS SCREEN ===== */
    .results-container { display: flex; flex-direction: column; }

    .results-header {
      margin-bottom: 8px;
      text-align: center;
      padding: 40px 0 32px;
    }

    .results-intro {
      font-size: 14px;
      color: var(--medium);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .big-number {
      font-size: 56px;
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--red);
      margin-bottom: 4px;
      letter-spacing: -2px;
      animation: countUp 0.8s var(--ease-out) both;
    }

    @media (max-width: 400px) {
      .big-number { font-size: 44px; letter-spacing: -1.5px; }
    }

    .big-number-context {
      font-size: 16px;
      color: var(--medium);
      font-weight: 500;
    }

    .methodology {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 12px;
      line-height: 1.5;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
      margin-top: 16px;
      letter-spacing: 0.3px;
    }

    /* ===== TAB BAR ===== */
    .tabs {
      display: flex;
      background: var(--charcoal);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
      position: sticky;
      top: 0;
      z-index: 9;
      box-shadow: 0 4px 12px rgba(28, 32, 36, 0.15);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-family: var(--font-primary);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.25s var(--ease-out);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
      min-width: 0;
      position: relative;
    }

    .tab-button:hover { color: rgba(255, 255, 255, 0.75); }

    .tab-button.active {
      background: var(--teal);
      color: var(--white);

    // ===== CALCULATION ENGINE =====
    function roundLeak(amount) {
      if (amount > 1000) return Math.round(amount / 100) * 100;
      return Math.round(amount / 50) * 50;
    }

    function getScoreBadge(totalScore) {
      if (totalScore >= 45) return { label: 'Strong', color: '#16A34A' };
      if (totalScore >= 30) return { label: 'Needs Work', color: '#D97706' };
      return { label: 'Critical', color: '#DC2626' };
    }

    function getStageColor(stageId, totalScore) {
      const stage = STAGES.find(s => s.id === stageId);
      const isTwoQuestion = stage.questionIds.length === 2;
      if (isTwoQuestion) {
        if (totalScore <= 4) return '#DC2626';
        if (totalScore <= 7) return '#D97706';
        return '#16A34A';
      } else {
        if (totalScore <= 1) return '#DC2626';
        if (totalScore <= 3) return '#D97706';
        return '#16A34A';
      }
    }

    function calculateResults(answers, profile) {
      const businessType = BUSINESS_TYPES.find(bt => bt.id === profile.businessType);
      const category = businessType.category;
      const weights = STAGE_WEIGHTS[category];
      const annualRevenue = profile.revenue;
      const stageScores = {};
      const stageLeaks = {};

      STAGES.forEach(stage => {
        const qIds = stage.questionIds;
        const stageAnswers = qIds.map(qId => answers[qId]).filter(a => a !== undefined);
        let totalStageScore = 0;
        let leakMultiplierForStage = 1;

        stageAnswers.forEach(answer => {
          if (answer) {
            const question = AUDIT_QUESTIONS.find(q => q.id === answer.questionId);
            const option = question.options.find(o => o.label === answer.label);
            totalStageScore += option.score;
            leakMultiplierForStage *= option.leakMultiplier;
          }
        });

        stageScores[stage.id] = totalStageScore;
        const baseLeak = annualRevenue * weights[stage.id];
        stageLeaks[stage.id] = Math.round(baseLeak * leakMultiplierForStage);
      });

      const totalLeak = Object.values(stageLeaks).reduce((a, b) => a + b, 0);
      const totalScore = Object.values(stageScores).reduce((a, b) => a + b, 0);
      const topLeaks = Object.entries(stageLeaks)
        .map(([stageId, leak]) => ({ stageId, leak }))
        .sort((a, b) => b.leak - a.leak)
        .slice(0, 3);

      return { stageScores, stageLeaks, totalLeak, totalScore, topLeaks };
    }

    // ===== ANIMATED COUNTER COMPONENT =====
    function AnimatedNumber({ value, duration = 1200 }) {
      const [display, setDisplay] = useState(0);
      const prevRef = useRef(0);

      useEffect(() => {
        const start = prevRef.current;
        const end = value;
        const startTime = performance.now();
        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setDisplay(Math.round(start + (end - start) * eased));
          if (progress < 1) requestAnimationFrame(animate);
          else prevRef.current = end;
        };
        requestAnimationFrame(animate);
      }, [value]);

      return <span>${display.toLocaleString()}</span>;
    }

      const handleAnswerQuestion = (questionId, label, leakAmount) => {
        const newAnswers = { ...answers, [questionId]: { questionId, label } };
        setAnswers(newAnswers);
        if (leakAmount > 2000) {
          setShowFlash({ text: `+$${leakAmount.toLocaleString()} \u00b7 ${STAGES.find(s => s.id === AUDIT_QUESTIONS.find(q => q.id === questionId).stage).label}` });
          setTimeout(() => setShowFlash(null), 2200);
        }
        setTimeout(() => {
          if (auditQuestion < AUDIT_QUESTIONS.length - 1) {
            setAuditQuestion(auditQuestion + 1);
          } else {
            const calculated = calculateResults(newAnswers, profile);
            setResults(calculated);
            setScreen('results');
            setActiveTab('results');
          }
        }, 200);
      };

      const handleBack = () => {
        if (screen === 'setup' && setupStep > 1) setSetupStep(setupStep - 1);
        else if (screen === 'setup') setScreen('welcome');
        else if (screen === 'audit' && auditQuestion > 0) setAuditQuestion(auditQuestion - 1);
        else if (screen === 'audit') setScreen('setup');
        else if (screen === 'results') setScreen('welcome');
      };

      const handleCopy = (text, id) => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        } else { fallbackCopy(text); }
        setCopiedText(id);
        setTimeout(() => setCopiedText(null), 2000);
      };

      const fallbackCopy = (text) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      };

      const handleStartOver = () => {
        localStorage.removeItem('autobotics_toolkit_v2');
        setScreen('welcome'); setSetupStep(1);
        setProfile({ businessType: '', revenue: 0, teamSize: 0, jobsPerWeek: 0 });
        setAnswers({}); setResults(null); setActiveTab('results');
        setAuditQuestion(0); setCheckedTasks({});
      };

      // === WELCOME ===
      if (screen === 'welcome') {
        const features = [
          { icon: 'barChart', text: 'Revenue leak analysis' },
          { icon: 'wrench', text: 'Actionable fix-it kits' },
          { icon: 'cpu', text: 'AI-powered prompts' },
          { icon: 'clipboard', text: '90-day implementation plan' },
          { icon: 'copy', text: 'Copy-paste scripts & templates' }
        ];
        return (
          <div className="container">
            <div className="welcome-container">
              <div className="wordmark fade-in">
                <span className="wordmark-auto">auto</span><span className="wordmark-botics">botics</span>
              </div>
              <div className="welcome-badge fade-in-delay-1">
                <span className="welcome-badge-dot"></span>
                Interactive Self-Audit
              </div>
              <h1 className="welcome-headline fade-in-delay-1">The Operator's Toolkit</h1>
              <p className="welcome-subline fade-in-delay-2">
                Score your business across 8 stages. See exactly where money is leaking. Get the scripts and tools to fix it — tonight.
              </p>
              <div className="features-grid fade-in-delay-2">
                {features.map((f, i) => (
                  <div key={i} className="feature-item" style={{ animationDelay: `${0.25 + i * 0.05}s` }}>
                    <div className="feature-icon-wrap">
                      <Icon name={f.icon} size={18} className="feature-icon" />
                    </div>
                    <span className="feature-text">{f.text}</span>
                  </div>
                ))}
              </div>
              <div className="welcome-meta fade-in-delay-3">~5 min · works on your phone</div>
              <div className="fade-in-delay-3" style={{ width: '100%', maxWidth: 400 }}>
                <button className="button button-primary" onClick={handleStartAudit}>
                  Start My Self-Audit →
                </button>
              </div>
            </div>
          </div>
        );
      }

      // === SETUP ===
      if (screen === 'setup') {
        const fields = [
          { step: 1, eyebrow: 'Step 1 of 4', title: 'What type of business do you run?', options: BUSINESS_TYPES, key: 'businessType' },
          { step: 2, eyebrow: 'Step 2 of 4', title: "What's your approximate annual revenue?", options: REVENUE_OPTIONS, key: 'revenue' },
          { step: 3, eyebrow: 'Step 3 of 4', title: 'How many people, including you?', options: TEAM_SIZE_OPTIONS, key: 'teamSize' },
          { step: 4, eyebrow: 'Step 4 of 4', title: 'How many jobs per week?', options: JOBS_PER_WEEK_OPTIONS, key: 'jobsPerWeek' }
        ];
        const cur = fields.find(f => f.step === setupStep);

        return (
          <div className="container fade-in">
            <div className="setup-header">
              <button className="back-button" onClick={handleBack}><Icon name="chevronLeft" size={22} /></button>
              <div className="progress-steps">
                {[1,2,3,4].map(i => <div key={i} className={`step-dot ${i === setupStep ? 'active' : i < setupStep ? 'completed' : ''}`} />)}
              </div>
              <div style={{ width: 42 }}></div>
            </div>
            <div className="setup-eyebrow">{cur.eyebrow}</div>
            <h2 className="setup-title">{cur.title}</h2>
            {setupStep === 1 ? (
              <div className="business-types-grid">
                {cur.options.map((opt, i) => (
                  <div key={opt.id} className="type-card card-interactive" onClick={() => handleSetupSelect(cur.key, opt.id)}
                    style={{ animation: `staggerIn 0.3s var(--ease-out) ${i * 0.04}s both` }}>
                    <Icon name={['cleaning','landscaping','pest'].includes(opt.id) ? 'repeat' : ['hvac','plumbing'].includes(opt.id) ? 'alertTriangle' : 'wrench'} size={28} className="type-card-icon" />
                    <div className="type-card-label">{opt.label}</div>
                  </div>
                ))}
              </div>
            ) : (
              <div>
                {cur.options.map((opt, i) => (
                  <button key={opt.id || opt.value} className="option-button"
                    onClick={() => handleSetupSelect(cur.key, opt.value)}
                    style={{ animation: `staggerIn 0.3s var(--ease-out) ${i * 0.05}s both` }}>
                    {opt.label}
                    {profile[cur.key] === opt.value && <Icon name="check" size={20} color="var(--teal)" />}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      }

      // === AUDIT ===
      if (screen === 'audit') {
        const question = AUDIT_QUESTIONS[auditQuestion];
        const stage = STAGES.find(s => s.id === question.stage);
        let totalLeak = 0;
        Object.entries(answers).forEach(([qId, ans]) => {
          if (ans) {
            const q = AUDIT_QUESTIONS.find(qq => qq.id === qId);
            const opt = q.options.find(o => o.label === ans.label);
            const w = STAGE_WEIGHTS[BUSINESS_TYPES.find(bt => bt.id === profile.businessType).category];
            totalLeak += Math.round(profile.revenue * w[q.stage] * opt.leakMultiplier);
          }
        });
        const isCritical = totalLeak >= 20000;
        const progress = ((auditQuestion + 1) / AUDIT_QUESTIONS.length) * 100;

        return (
          <div className="container">
            <div className="audit-container">
              <div className="audit-header fade-in">
                <div className={`counter ${isCritical ? 'critical' : ''}`}>
                  <div className="counter-left">
                    <div className="counter-label">Revenue leaking</div>
                    <div className="counter-amount"><AnimatedNumber value={Math.round(totalLeak / 100) * 100} duration={600} /></div>
                  </div>
                  <Icon name="trendingUp" size={28} className="counter-icon" color="currentColor" />
                </div>
                <div className="progress-bar-container">
                  <div className="progress-meta">
                    <span className="progress-label">Question {auditQuestion + 1} of {AUDIT_QUESTIONS.length}</span>
                    <span className="progress-label" style={{ fontFamily: 'var(--font-mono)' }}>{Math.round(progress)}%</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width: progress + '%' }}></div></div>
                </div>
                <div className="stage-chip">
                  <Icon name={stage.icon} size={14} className="stage-chip-icon" />
                  {stage.label}
                </div>
              </div>
              <div className="question-container" key={question.id}>
                <h2 className="question-title">{question.question}</h2>
                <p className="question-subtext">{question.subtext}</p>
                {question.options.map((opt, idx) => (
                  <button key={idx} className="answer-option card-interactive" onClick={() => {
                    const w = STAGE_WEIGHTS[BUSINESS_TYPES.find(bt => bt.id === profile.businessType).category];
                    const leak = Math.round(profile.revenue * w[question.stage] * opt.leakMultiplier);
                    handleAnswerQuestion(question.id, opt.label, leak);
                  }} style={{ animation: `staggerIn 0.25s var(--ease-out) ${idx * 0.05}s both` }}>
                    {opt.label}
                  </button>
                ))}
                <div className="audit-nav">
                  <button className="nav-button" disabled={auditQuestion === 0} onClick={() => { if (auditQuestion > 0) setAuditQuestion(auditQuestion - 1); }}>\u2190 Back</button>
                  <button className="nav-button" onClick={handleBack}>Exit</button>
                </div>
              </div>
            </div>
            {showFlash && <div className="counter-flash">{showFlash.text}</div>}
          </div>
        );
      }

      // === RESULTS ===
      if (screen === 'results' && results) {
        const badge = getScoreBadge(results.totalScore);
        const isAllGreen = results.totalScore >= 45 && roundLeak(results.totalLeak) < 8000;
        const maxLeak = Math.max(...Object.values(results.stageLeaks));

        return (
          <div className="container fade-in">
            <div className="results-container">
              <div className="tabs">
                {[
                  { id: 'results', label: 'Results' },
                  { id: 'fixit', label: 'Fix-It' },
                  { id: 'prompts', label: 'Prompts' },
                  { id: 'tools', label: 'Tools' },
                  { id: 'ninetyDays', label: '90 Days' }
                ].map(tab => (
                  <button key={tab.id} className={`tab-button ${activeTab === tab.id ? 'active' : ''}`} onClick={() => setActiveTab(tab.id)}>
                    {tab.label}
                  </button>
                ))}
              </div>

              {/* RESULTS TAB */}
              {activeTab === 'results' && (
                <div className="tab-content">
                  <div className="results-header">
                    <p className="results-intro fade-in">Your business is leaving approximately</p>
                    <div className="big-number">${roundLeak(results.totalLeak).toLocaleString()}</div>
                    <p className="big-number-context fade-in-delay-1">/year in revenue opportunity</p>
                    <div className="score-badge fade-in-delay-2" style={{ backgroundColor: badge.color }}>{badge.label} \u00b7 {results.totalScore}/60</div>
                    <p className="methodology fade-in-delay-2">Based on your profile, industry benchmarks, and answers</p>
                  </div>

                  {isAllGreen && (
                    <div className="all-green-card fade-in-delay-2">
                      <div className="all-green-title">You're doing great.</div>
                      <div className="all-green-text">Your systems are solid. Focus on optimization and scaling, not fixing leaks. The 90-Day Plan and AI prompts can help you level up from here.</div>
                    </div>
                  )}

                  <div className="stage-bars-section fade-in-delay-2">
                    <div className="stage-bars-title">Revenue by Stage</div>
                    {STAGES.map((stage, i) => {
                      const leak = results.stageLeaks[stage.id];
                      const score = results.stageScores[stage.id];
                      const color = getStageColor(stage.id, score);
                      const width = maxLeak > 0 ? (leak / maxLeak) * 100 : 0;
                      return (
                        <div key={stage.id} className="stage-bar" style={{ animation: `staggerIn 0.3s var(--ease-out) ${0.3 + i * 0.06}s both` }}>
                          <div className="stage-bar-label">
                            <span className="stage-bar-name">{stage.label}</span>
                            <span className="stage-bar-amount">${leak.toLocaleString()}</span>
                          </div>
                          <div className="stage-bar-track">
                            <div className="stage-bar-fill" style={{ width: Math.max(width, 3) + '%', background: color, animationDelay: `${0.4 + i * 0.08}s` }}>
                              {width > 15 && <span>${Math.round(leak / 1000)}k</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="top-leaks">
                    <div className="top-leaks-title">Your Top 3 Revenue Leaks</div>
                    {results.topLeaks.map((leak, idx) => {
                      const stage = STAGES.find(s => s.id === leak.stageId);
                      return (
                        <div key={stage.id} className="leak-card" style={{ animation: `staggerIn 0.3s var(--ease-out) ${0.5 + idx * 0.1}s both` }}>
                          <div className="leak-rank">{idx + 1}</div>
                          <div className="leak-content">
                            <div className="leak-stage">{stage.label}</div>
                            <div className="leak-amount">${leak.leak.toLocaleString()}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <button className="button button-primary" style={{ marginBottom: 32 }} onClick={() => setActiveTab('fixit')}>
                    See Your Fix-It Kits \u2192
                  </button>
                </div>
              )}

              {/* FIX-IT TAB */}
              {activeTab === 'fixit' && (
                <div className="tab-content">
                  <div style={{ marginBottom: 20 }}>
                    <h2 style={{ marginBottom: 4 }}>Fix-It Kits</h2>
                    <p className="caption">Scripts, tools, and actions for your top 3 leaks</p>
                  </div>
                  {results.topLeaks.map((leak, kitIdx) => {
                    const stage = STAGES.find(s => s.id === leak.stageId);
                    const kit = FIX_IT_KITS[stage.id];
                    const isOpen = expandedKit === stage.id;
                    return (
                      <div key={stage.id} className="kit-card" style={{ animation: `staggerIn 0.3s var(--ease-out) ${kitIdx * 0.08}s both` }}>
                        <div className="kit-header card-interactive" onClick={() => setExpandedKit(isOpen ? null : stage.id)}>
                          <div className="kit-header-left">
                            <div className="kit-icon-wrap">
                              <Icon name={stage.icon} size={20} className="kit-header-icon" />
                            </div>
                            <div className="kit-header-title">
                              <div className="kit-header-stage">{stage.label}</div>
                              <div className="kit-leak-amount">-${leak.leak.toLocaleString()}/yr</div>
                            </div>
                          </div>
                          <div className="kit-toggle" style={{ transform: isOpen ? 'rotate(180deg)' : 'rotate(0)' }}>
                            <Icon name="chevronDown" size={20} />
                          </div>
                        </div>
                        <div className={`kit-body ${isOpen ? 'open' : ''}`}>
                          <div className="kit-headline">{kit.headline}</div>
                          <div className="kit-content">
                            <div className="first-action"><strong>First action:</strong> {kit.firstAction}</div>
                            {kit.scripts.map((script, idx) => (
                              <div key={idx} className="script-item">
                                <div className="script-title">{script.name}</div>
                                <div className="script-text">{script.text}</div>
                                <button className={`copy-button ${copiedText === 'script-'+stage.id+'-'+idx ? 'copied' : ''}`}
                                  onClick={() => handleCopy(script.text, `script-${stage.id}-${idx}`)}>
                                  <Icon name={copiedText === 'script-'+stage.id+'-'+idx ? 'check' : 'copy'} size={14} />
                                  {copiedText === `script-${stage.id}-${idx}` ? 'Copied!' : 'Copy'}
                                </button>
                              </div>
                            ))}
                            <div className="tool-rec-card">
                              <div className="tool-rec-label">Recommended Tool</div>
                              <div className="tool-rec-name">{kit.tool.name}</div>
                              <div className="tool-rec-cost">{kit.tool.cost}</div>
                              <div className="tool-rec-why">{kit.tool.why}</div>
                              <div className="tool-rec-alt">Free alternative: {kit.tool.freeAlt}</div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* PROMPTS TAB */}
              {activeTab === 'prompts' && (
                <div className="tab-content">
                  <div style={{ marginBottom: 20 }}>
                    <h2 style={{ marginBottom: 4 }}>AI Prompt Lab</h2>
                    <p className="caption">Pre-filled prompts personalized to your results</p>
                  </div>
                  <div className="prompt-card ai-onramp" style={{ marginBottom: 24 }}>
                    <h3>Never used ChatGPT before?</h3>
                    <div className="onramp-steps">
                      {['Go to chatgpt.com on your phone (it\'s free)', 'Sign up with your Google account', 'Paste the prompt below into the message box', 'Read the answer. Ask follow-ups like "Be more specific" or "Give me the exact steps"'].map((step, idx) => (
                        <div key={idx} className="onramp-step">
                          <div className="onramp-number">{idx + 1}</div>
                          <div className="onramp-text">{step}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="prompt-card highlight">
                    <h3 style={{ marginBottom: 12 }}>The Master Prompt</h3>
                    <p style={{ fontSize: 13, opacity: 0.7, marginBottom: 12 }}>Contains all your audit data. Paste into ChatGPT for a full action plan.</p>
                    <div className="prompt-text">{generateMasterPrompt(profile, results)}</div>
                    <button className={`copy-button ${copiedText === 'master' ? 'copied' : ''}`} onClick={() => handleCopy(generateMasterPrompt(profile, results), 'master')}>
                      <Icon name={copiedText === 'master' ? 'check' : 'copy'} size={14} />
                      {copiedText === 'master' ? 'Copied!' : 'Copy Prompt'}
                    </button>
                  </div>
                  <div className="prompt-section-title">Stage-Specific Prompts</div>
                  {results.topLeaks.map(leak => {
                    const stage = STAGES.find(s => s.id === leak.stageId);
                    const prompt = generateStagePrompt(stage, profile, results);
                    return (
                      <div key={stage.id} className="prompt-card">
                        <h3 style={{ marginBottom: 12 }}>{stage.label}</h3>
                        <div className="prompt-text">{prompt}</div>
                        <button className={`copy-button ${copiedText === 'stage-'+stage.id ? 'copied' : ''}`}
                          onClick={() => handleCopy(prompt, `stage-${stage.id}`)}>
                          <Icon name={copiedText === 'stage-'+stage.id ? 'check' : 'copy'} size={14} />
                          {copiedText === `stage-${stage.id}` ? 'Copied!' : 'Copy Prompt'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TOOLS TAB */}
              {activeTab === 'tools' && (
                <div className="tab-content">
                  <div style={{ marginBottom: 20 }}>
                    <h2 style={{ marginBottom: 4 }}>Tool Stacks</h2>
                    <p className="caption">Recommended tools by budget level</p>
                  </div>
                  {Object.entries(TOOL_STACKS).map(([key, tier], idx) => (
                    <div key={key} className="tool-tier-card" style={{ animation: `staggerIn 0.3s var(--ease-out) ${idx * 0.08}s both` }}>
                      <div className="tool-tier-header">
                        <div className="tool-tier-label">{tier.label}</div>
                        <div className="tool-tier-subtitle">{tier.subtitle}</div>
                      </div>
                      <div className="tool-list">
                        {tier.tools.map((tool, tIdx) => (
                          <div key={tIdx} className="tool-item">
                            <Icon name="checkCircle" size={20} className="tool-item-check" />
                            <div className="tool-item-content">
                              <div className="tool-item-name">{tool.name}</div>
                              <div className="tool-item-purpose">{tool.purpose}</div>
                              <div className="tool-item-cost">{tool.cost}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* 90 DAYS TAB */}
              {activeTab === 'ninetyDays' && (
                <div className="tab-content">
                  <div style={{ marginBottom: 20 }}>
                    <h2 style={{ marginBottom: 4 }}>Your 90-Day Plan</h2>
                    <p className="caption">A phased roadmap to plug your revenue leaks</p>
                  </div>
                  {(() => {
                    const plan = generate90DayPlan();
                    return [plan.phase1, plan.phase2, plan.phase3, plan.phase4].map((phase, idx) => (
                      <div key={idx} className="phase-card" style={{ animation: `staggerIn 0.3s var(--ease-out) ${idx * 0.08}s both` }}>
                        <div className="phase-header">
                          <div className="phase-number">{idx + 1}</div>
                          <div>
                            <div className="phase-title">{phase.title}</div>
                            <div className="phase-timeframe">{phase.timeframe}</div>
                          </div>
                        </div>
                        <div className="task-list">
                          {phase.tasks.map((task, tIdx) => (
                            <div key={tIdx} className={`task-item ${checkedTasks[`${idx}-${tIdx}`] ? 'checked' : ''}`} onClick={() => {
                              setCheckedTasks({ ...checkedTasks, [`${idx}-${tIdx}`]: !checkedTasks[`${idx}-${tIdx}`] });
                            }}>
                              <div className="task-checkbox">
                                {checkedTasks[`${idx}-${tIdx}`] && <Icon name="check" size={14} color="var(--white)" />}
                              </div>
                              <div className="task-text">{task}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ));
                  })()}
                  <div className="blueprint-cta">
                    <div className="blueprint-headline">Ready for the deep analysis?</div>
                    <div className="blueprint-subtext">
                      The Toolkit shows you where to look. The Automation Blueprint does the heavy lifting for you — custom research, AI-powered analysis, and a step-by-step implementation spec.
                    </div>
                    <button className="blueprint-button" onClick={() => window.open('https://theautobotics.com/blueprint', '_blank')}>
                      Learn About the Blueprint \u2192
                    </button>
                  </div>
                </div>
              )}

              <div className="results-footer">
                <a className="start-over-link" onClick={handleStartOver} role="button">Start Over</a>
                <span style={{ margin: '0 8px' }}>\u00b7</span>
                <span>Autobotics Operator's Toolkit</span>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
