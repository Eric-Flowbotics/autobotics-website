<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autobotics Operator's Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --teal: #0D9488;
      --teal-hover: #0B7C72;
      --teal-light: rgba(13, 148, 136, 0.08);
      --teal-border: rgba(13, 148, 136, 0.25);
      --teal-glow: rgba(13, 148, 136, 0.15);
      --amber: #D97706;
      --amber-light: #FFFBEB;
      --charcoal: #1C2024;
      --cream: #FAF7F2;
      --white: #FFFFFF;
      --medium: #5C6370;
      --muted: #9CA3AF;
      --border: #E8E2D9;
      --border-strong: #D4CFC6;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --red-glow: rgba(220, 38, 38, 0.12);
      --green: #16A34A;
      --green-light: #F0FDF4;
      --font-primary: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

      --shadow-xs: 0 1px 2px rgba(28, 32, 36, 0.04);
      --shadow-sm: 0 1px 3px rgba(28, 32, 36, 0.06), 0 1px 2px rgba(28, 32, 36, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(28, 32, 36, 0.07), 0 2px 4px -2px rgba(28, 32, 36, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(28, 32, 36, 0.08), 0 4px 6px -4px rgba(28, 32, 36, 0.04);
      --shadow-xl: 0 20px 25px -5px rgba(28, 32, 36, 0.08), 0 8px 10px -6px rgba(28, 32, 36, 0.04);
      --shadow-inner: inset 0 2px 4px rgba(28, 32, 36, 0.04);
      --shadow-card: 0 1px 3px rgba(28, 32, 36, 0.06), 0 1px 2px rgba(28, 32, 36, 0.04), 0 0 0 1px rgba(232, 226, 217, 0.7);
      --shadow-card-hover: 0 8px 16px -4px rgba(28, 32, 36, 0.08), 0 2px 6px rgba(28, 32, 36, 0.04), 0 0 0 1px rgba(13, 148, 136, 0.2);

      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --radius-full: 9999px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--font-primary);
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.6px; line-height: 1.12; }
    h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.25; }
    h3 { font-size: 17px; font-weight: 700; line-height: 1.35; letter-spacing: -0.2px; }
    small, .caption { font-size: 13px; color: var(--muted); }
    .mono { font-family: var(--font-mono); }

    #root { min-height: 100vh; background: var(--cream); }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    @media (min-width: 768px) {
      .container { padding: 32px 40px; }
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 20px;
      transition: box-shadow 0.3s var(--ease-out), transform 0.2s var(--ease-out);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      box-shadow: var(--shadow-card-hover);
      opacity: 0;
      transition: opacity 0.3s var(--ease-out);
      pointer-events: none;
    }

    .card:hover::before { opacity: 1; }

    .card-interactive { cursor: pointer; user-select: none; }

    .card-interactive:active {
      transform: scale(0.98);
      transition-duration: 0.1s;
    }

    /* ===== BUTTONS ===== */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-primary);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .button-primary {
      background: var(--teal);
      color: var(--white);
      width: 100%;
      height: 52px;
      font-size: 16px;
      border-radius: var(--radius-sm);
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25), 0 1px 2px rgba(13, 148, 136, 0.15);
      letter-spacing: -0.2px;
    }

    .button-primary:hover {
      background: var(--teal-hover);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3), 0 2px 4px rgba(13, 148, 136, 0.2);
      transform: translateY(-1px);
    }

    .button-primary:active {
      background: #097069;
      transform: translateY(0) scale(0.98);
      box-shadow: 0 1px 4px rgba(13, 148, 136, 0.2);
    }

    .button-secondary {
      background: var(--white);
      color: var(--teal);
      border: 2px solid var(--teal);
    }

    .button-secondary:active {
      background: var(--teal-light);
      transform: scale(0.98);
    }

    .button-small {
      padding: 8px 14px;
      font-size: 13px;
      height: auto;
    }

    /* ===== ANIMATIONS ===== */
    .fade-in { animation: fadeIn 0.4s var(--ease-out) both; }
    .fade-in-delay-1 { animation: fadeIn 0.4s var(--ease-out) 0.1s both; }
    .fade-in-delay-2 { animation: fadeIn 0.4s var(--ease-out) 0.2s both; }
    .fade-in-delay-3 { animation: fadeIn 0.4s var(--ease-out) 0.3s both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .slide-in { animation: slideIn 0.35s var(--ease-out) both; }

    @keyframes slideIn {
      from { transform: translateX(24px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes scaleReveal {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.03); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(16px) scale(0.9); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes barGrow {
      from { width: 0; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
      50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.1); }
    }

    @keyframes shimmer {
      from { background-position: -200% 0; }
      to { background-position: 200% 0; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes flashIn {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      30% { transform: translate(-50%, -50%) scale(0.97); }
      40% { transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== WELCOME SCREEN ===== */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .wordmark-auto { color: var(--charcoal); }
    .wordmark-botics { color: var(--teal); }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--charcoal);
      color: var(--white);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .welcome-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: breathe 2s ease-in-out infinite;
    }

    .welcome-headline {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    @media (max-width: 500px) {
      .welcome-headline { font-size: 30px; letter-spacing: -0.6px; }
    }

    .welcome-subline {
      font-size: 16px;
      color: var(--medium);
      margin-bottom: 40px;
      line-height: 1.65;
      max-width: 440px;
    }

    .features-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 400px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-xs);
      transition: all 0.2s var(--ease-out);
    }

    .feature-item:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--teal-border);
    }

    .feature-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-xs);
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon {
      width: 18px;
      height: 18px;
      color: var(--teal);
    }

    .feature-text {
      font-size: 14px;
      color: var(--charcoal);
      font-weight: 600;
    }

    .welcome-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      letter-spacing: 0.2px;
    }

    /* ===== SETUP SCREEN ===== */
    .setup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-top: 8px;
    }

    .back-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      transition: background 0.15s;
      color: var(--charcoal);
    }

    .back-button:active { background: var(--teal-light); }

    .progress-steps {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.35s var(--ease-spring);
    }

    .step-dot.active {
      background: var(--teal);
      width: 28px;
      border-radius: var(--radius-xs);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    .step-dot.completed {
      background: var(--teal);
    }

    .setup-eyebrow {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .setup-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    .business-types-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (min-width: 500px) {
      .business-types-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .type-card {
      padding: 18px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-height: 100px;
      justify-content: center;
      box-shadow: var(--shadow-xs);
    }

    .type-card:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-md);
    }

    .type-card:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.97);
    }

    .type-card-icon {
      width: 28px;
      height: 28px;
      color: var(--teal);
    }

    .type-card-label {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--charcoal);
    }

    .option-button {
      width: 100%;
      padding: 16px 20px;
      text-align: left;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
      margin-bottom: 12px;
      font-family: var(--font-primary);
      box-shadow: var(--shadow-xs);
      color: var(--charcoal);
    }

    .option-button:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-sm);
    }

    .option-button:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.985);
    }

    /* ===== AUDIT SCREEN ===== */
    .audit-container { display: flex; flex-direction: column; }

    .audit-header {
      position: sticky;
      top: 0;
      background: linear-gradient(to bottom, var(--cream) 85%, transparent);
      padding: 16px 0 24px;
      z-index: 10;
    }

    .counter {
      background: linear-gradient(135deg, #F59E0B, var(--amber));
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 14px;
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(217, 119, 6, 0.2);
      transition: all 0.5s var(--ease-out);
    }

    .counter.critical {
      background: linear-gradient(135deg, #EF4444, var(--red));
      box-shadow: 0 2px 12px rgba(220, 38, 38, 0.25);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .counter-left { display: flex; flex-direction: column; }

    .counter-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.85;
    }

    .counter-amount {
      font-size: 28px;
      font-weight: 800;
      font-family: var(--font-mono);
      letter-spacing: -0.5px;
      transition: all 0.3s var(--ease-out);
    }

    .counter-icon {
      width: 32px;
      height: 32px;
      opacity: 0.7;
    }

    .counter-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--red);
      color: var(--white);
      padding: 14px 24px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 14px;
      font-family: var(--font-mono);
      z-index: 100;
      pointer-events: none;
      animation: flashIn 2.2s var(--ease-out) forwards;
      box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3);
    }

    .progress-bar-container { margin-bottom: 12px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal), #14B8A6);
      transition: width 0.4s var(--ease-out);
      border-radius: var(--radius-full);
    }

    .stage-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
      margin-bottom: 20px;
      padding: 6px 12px;
      background: var(--teal-light);
      border-radius: var(--radius-full);
      border: 1px solid var(--teal-border);
    }

    .stage-chip-icon {
      width: 14px;
      height: 14px;
    }

    .question-container { animation: slideIn 0.3s var(--ease-out); }

    .question-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
      letter-spacing: -0.4px;
    }

    .question-subtext {
      font-size: 14px;
      font-style: italic;
      color: var(--medium);
      margin-bottom: 28px;
      line-height: 1.65;
      padding-left: 14px;
      border-left: 3px solid var(--amber);
    }

    .answer-option {
      padding: 16px 18px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      transition: all 0.15s var(--ease-out);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 12px;
      min-height: 56px;
      display: flex;
      align-items: center;
      font-family: var(--font-primary);
      color: var(--charcoal);
      font-weight: 500;
      box-shadow: var(--shadow-xs);
    }

    .answer-option:hover {
      border-color: var(--teal-border);
      box-shadow: var(--shadow-sm);
    }

    .answer-option:active {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(0.985);
      transition-duration: 0.08s;
    }

    .audit-nav {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .nav-button {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      font-family: var(--font-primary);
      font-weight: 600;
      font-size: 14px;
      color: var(--medium);
      transition: all 0.2s;
    }

    .nav-button:disabled { opacity: 0.4; cursor: not-allowed; }

    .nav-button:active:not(:disabled) {
      background: var(--teal-light);
      border-color: var(--teal);
    }

    /* ===== RESULTS SCREEN ===== */
    .results-container { display: flex; flex-direction: column; }

    .results-header {
      margin-bottom: 8px;
      text-align: center;
      padding: 40px 0 32px;
    }

    .results-intro {
      font-size: 14px;
      color: var(--medium);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .big-number {
      font-size: 56px;
      font-weight: 800;
      font-family: var(--font-mono);
      color: var(--red);
      margin-bottom: 4px;
      letter-spacing: -2px;
      animation: countUp 0.8s var(--ease-out) both;
    }

    @media (max-width: 400px) {
      .big-number { font-size: 44px; letter-spacing: -1.5px; }
    }

    .big-number-context {
      font-size: 16px;
      color: var(--medium);
      font-weight: 500;
    }

    .methodology {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 12px;
      line-height: 1.5;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
      margin-top: 16px;
      letter-spacing: 0.3px;
    }

    /* ===== TAB BAR ===== */
    .tabs {
      display: flex;
      background: var(--charcoal);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
      position: sticky;
      top: 0;
      z-index: 9;
      box-shadow: 0 4px 12px rgba(28, 32, 36, 0.15);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-family: var(--font-primary);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.25s var(--ease-out);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
      min-width: 0;
      position: relative;
    }

    .tab-button:hover { color: rgba(255, 255, 255, 0.75); }

    .tab-button.active {
      background: var(--teal);
      color: var(--white);

    // ===== CALCULATION ENGINE =====
    function roundLeak(amount) {
      if (amount > 1000) return Math.round(amount / 100) * 100;
      return Math.round(amount / 50) * 50;
    }

    function getScoreBadge(totalScore) {
      if (totalScore >= 45) return { label: 'Strong', color: '#16A34A' };
      if (totalScore >= 30) return { label: 'Needs Work', color: '#D97706' };
      return { label: 'Critical', color: '#DC2626' };
    }

    function getStageColor(stageId, totalScore) {
      const stage = STAGES.find(s => s.id === stageId);
      const isTwoQuestion = stage.questionIds.length === 2;
      if (isTwoQuestion) {
        if (totalScore <= 4) return '#DC2626';
        if (totalScore <= 7) return '#D97706';
        return '#16A34A';
      } else {
        if (totalScore <= 1) return '#DC2626';
        if (totalScore <= 3) return '#D97706';
        return '#16A34A';
      }
    }

    // ONE calculation function. Counter and results both use this.
    function calculateResults(answers, profile) {
      const businessType = BUSINESS_TYPES.find(bt => bt.id === profile.businessType);
      const category = businessType.category;
      const weights = STAGE_WEIGHTS[category];
      const annualRevenue = profile.revenue;
      const stageScores = {};
      const stageLeaks = {};

      STAGES.forEach(stage => {
        const qIds = stage.questionIds;
        let totalStageScore = 0;
        const leakMultipliers = [];

        qIds.forEach(qId => {
          const answer = answers[qId];
          if (answer) {
            const question = AUDIT_QUESTIONS.find(q => q.id === qId);
            const option = question.options.find(o => o.label === answer.label);
            if (option) {
              totalStageScore += option.score;
              leakMultipliers.push(option.leakMultiplier);
            }
          }
        });

        stageScores[stage.id] = totalStageScore;

        // AVERAGE the multipliers for multi-question stages (per Data Engine V2 spec)
        const avgMultiplier = leakMultipliers.length > 0
          ? leakMultipliers.reduce((a, b) => a + b, 0) / leakMultipliers.length
          : 0;

        const rawLeak = annualRevenue * weights[stage.id] * avgMultiplier;
        stageLeaks[stage.id] = roundLeak(rawLeak);
      });

      // Total rounds to nearest $100
      const rawTotal = Object.values(stageLeaks).reduce((a, b) => a + b, 0);
      const totalLeak = Math.round(rawTotal / 100) * 100;
      const totalScore = Object.values(stageScores).reduce((a, b) => a + b, 0);
      const topLeaks = Object.entries(stageLeaks)
        .map(([stageId, leak]) => ({ stageId, leak }))
        .sort((a, b) => b.leak - a.leak)
        .slice(0, 3);

      return { stageScores, stageLeaks, totalLeak, totalScore, topLeaks };
    }

    // Calculate running counter total from current answers (uses same logic as calculateResults)
    function calculateRunningTotal(answers, profile) {
      if (!profile.businessType || !profile.revenue) return 0;
      const result = calculateResults(answers, profile);
      return result.totalLeak;
    }

    // ===== ANIMATED COUNTER COMPONENT =====
    function AnimatedNumber({ value, duration = 1200 }) {
      const [display, setDisplay] = useState(0);
      const prevRef = useRef(0);

      useEffect(() => {
        const start = prevRef.current;
        const end = value;
        const startTime = performance.now();
        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          setDisplay(Math.round(start + (end - start) * eased));
          if (progress < 1) requestAnimationFrame(animate);
          else prevRef.current = end;
        };
        requestAnimationFrame(animate);
      }, [value]);

      return <span>${display.toLocaleString()}</span>;
    }

            if (data.profile) setProfile(data.profile);
            if (data.answers) setAnswers(data.answers);
            if (data.results) setResults(data.results);

            if (data.checkedTasks) setCheckedTasks(data.checkedTasks);

        }
      }, []);

        setAnswers(newAnswers);
        const newTotal = calculateRunningTotal(newAnswers, profile);

        if (Math.abs(delta) > 2000) {

          const sign = delta >= 0 ? '+' : '-';
          setShowFlash({ text: `${sign}$${Math.abs(delta).toLocaleString()} · ${stageName}` });

      // === RESULTS ===
      if (screen === 'results' && results) {
        const badge = getScoreBadge(results.totalScore);
        const isAllGreen = results.totalLeak === 0;
        const maxLeak = Math.max(...Object.values(results.stageLeaks));
        const leakPct = results.totalLeak / profile.revenue;
        let headlineText, headlineColor;
        if (leakPct > 0.15) { headlineText = "Your business is leaving approximately"; headlineColor = '#DC2626'; }

        else { headlineText = "Your business is running tight."; headlineColor = '#0D9488'; }
        const strongCount = STAGES.filter(s => results.stageLeaks[s.id] === 0).length;

              {/* RESULTS TAB */}
              {activeTab === 'results' && (

                    {(leakPct > 0.01 && results.totalLeak > 0) ? (

                        <div className="big-number" style={{ color: headlineColor }}>${roundLeak(results.totalLeak).toLocaleString()}</div>
                        <p className="big-number-context fade-in-delay-1">/year in revenue opportunity</p>

                      <p className="fade-in-delay-1" style={{ fontSize: 14, color: 'var(--muted)', marginTop: 12 }}>We didn't find significant leaks in any stage.</p>

                    <>
                    <div className="all-green-card fade-in-delay-2">

                            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--charcoal)' }}>{stage.label}</span>
                          </div>

                      </div>
                    </div>
                    </>

                    <div className="stage-bars-title">Revenue Leak by Stage</div>

                      const score = results.stageScores[stage.id];
                      const color = getStageColor(stage.id, score);
                      const width = maxLeak > 0 ? (leak / maxLeak) * 100 : 0;
                      const explanations = stage.questionIds.map(qId => {
                        const ans = answers[qId];
                        if (ans && ANSWER_EXPLANATIONS[qId] && ANSWER_EXPLANATIONS[qId][ans.label]) {
                          return ANSWER_EXPLANATIONS[qId][ans.label];
                        }
                        return null;
                      }).filter(Boolean);

                        <div key={stage.id} className="stage-bar" style={{ animation: `staggerIn 0.3s var(--ease-out) ${0.3 + i * 0.06}s both` }}>

                      const leakTrigger = leak > 2000;
                      return scoreTrigger || leakTrigger;

                      stageId: stage.id,

                                  <div className="kit-header-stage">Browse all Fix-It Kits</div>

                                <Icon name="chevronDown" size={20} />

                </div>

                    <h3>Never used ChatGPT before?</h3>
                    <div className="onramp-steps">

                        <div key={idx} className="onramp-step">
                          <div className="onramp-number">{idx + 1}</div>
                          <div className="onramp-text">{step}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="prompt-card highlight">
                    <h3 style={{ marginBottom: 12 }}>The Master Prompt</h3>
                    <p style={{ fontSize: 13, opacity: 0.7, marginBottom: 12 }}>Contains all your audit data. Paste into ChatGPT for a full action plan.</p>
                    <div className="prompt-text">{generateMasterPrompt(profile, results)}</div>
                    <button className={`copy-button ${copiedText === 'master' ? 'copied' : ''}`} onClick={() => handleCopy(generateMasterPrompt(profile, results), 'master')}>
                      <Icon name={copiedText === 'master' ? 'check' : 'copy'} size={14} />

                  {results.topLeaks.map(leak => {

                        </button>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TOOLS TAB */}
              {activeTab === 'tools' && (() => {
                const toolsRealLeaks = results.topLeaks.filter(l => l.leak > 0);
                const hasRealLeaks = toolsRealLeaks.length > 0;
                const topLeakStageIds = toolsRealLeaks.slice(0, 3).map(l => l.stageId);
                const businessType = BUSINESS_TYPES.find(bt => bt.id === profile.businessType);
                const category = businessType ? businessType.category : 'project';

                // Find which tier contains the #1 leak's tool
                const topLeakKit = toolsRealLeaks[0] ? FIX_IT_KITS[toolsRealLeaks[0].stageId] : null;
                const topLeakToolName = topLeakKit ? topLeakKit.tool.name : null;
                const recommendedTierKey = topLeakToolName ? Object.keys(TOOL_STACKS).find(key =>
                  TOOL_STACKS[key].tools.some(t => t.name === topLeakToolName || (topLeakToolName && t.name.includes(topLeakToolName.split(' ')[0])))

                      <div style={{ marginBottom: 28 }}>
                        <h2 style={{ marginBottom: 4 }}>Tools That Fix Your Leaks</h2>
                        <p className="caption">Based on your top revenue leaks</p>
                      </div>

                            marginBottom: 14,

                      const aMatch = TOOL_STAGE_MAP[a.name] ? TOOL_STAGE_MAP[a.name].some(s => topLeakStageIds.includes(s)) : false;

                                <div className="tool-item-name" style={{ marginBottom: 0 }}>{tool.name}</div>

                                    <span key={stageId} style={{
                                      display: 'inline-flex', alignItems: 'center', padding: '2px 8px',
                                      borderRadius: 'var(--radius-full)', background: 'var(--teal)',
                                      color: 'var(--white)', fontSize: 10, fontWeight: 700, letterSpacing: '0.2px'
                                    }}>Fixes {stg.label}</span>
                                  ) : null;
                                })}

                              <div className="tool-item-purpose">{tool.purpose}</div>
                              <div className="tool-item-cost">{tool.cost}</div>

                          </div>

                    <div style={{
                      background: 'var(--cream)', border: '1px solid var(--border)',

                      marginTop: 8, marginBottom: 8,

                      <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>💡</span>

                    </div>

                    <p className="caption">A phased roadmap to plug your revenue leaks</p>
                  </div>
                  {(() => {
                    const plan = generate90DayPlan(results);
                    if (plan.leakCount === 0) {
                      return (
                        <div style={{ background: 'var(--green-light)', border: '1px solid rgba(22, 163, 74, 0.15)', borderRadius: 'var(--radius)', padding: '24px', marginBottom: 24, textAlign: 'center' }}>
                          <p style={{ fontSize: 15, color: 'var(--medium)', lineHeight: 1.65, marginBottom: 20 }}>You don't need a 90-day fix plan — your business is already running well across all 8 stages. The next step is finding deeper optimization opportunities that this self-assessment doesn't cover.</p>
                          <button className="blueprint-button" onClick={() => window.open('https://theautobotics.com/blueprint', '_blank')}>
                            Get Your Automation Blueprint — $197 →
                          </button>
                        </div>
                      );
                    }
                    return plan.phases.map((phase, idx) => (
                      <div key={idx} className="phase-card" style={{ animation: `staggerIn 0.3s var(--ease-out) ${idx * 0.08}s both` }}>
                        <div className="phase-header">
                          <div className="phase-number">{idx + 1}</div>
                          <div>
                            <div className="phase-title">{phase.title}</div>
                            <div className="phase-timeframe">{phase.timeframe}</div>
                          </div>
                        </div>
                        <div className="task-list">
                          {phase.tasks.map((task, tIdx) => (
                            <div key={tIdx} className={`task-item ${checkedTasks[`${idx}-${tIdx}`] ? 'checked' : ''}`} onClick={() => {
                              setCheckedTasks({ ...checkedTasks, [`${idx}-${tIdx}`]: !checkedTasks[`${idx}-${tIdx}`] });
                            }}>
                              <div className="task-checkbox">
                                {checkedTasks[`${idx}-${tIdx}`] && <Icon name="check" size={14} color="var(--white)" />}
                              </div>
                              <div className="task-text">{task}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ));
                  })()}
                  <div className="blueprint-cta">
                    <div className="blueprint-headline">Ready for the deep analysis?</div>
                    <div className="blueprint-subtext">
                      The Toolkit shows you where the money is leaking. The Automation Blueprint uses AI to analyze your specific business, research your market, and build a custom implementation plan with real ROI numbers.
                    </div>
                    <div style={{ display: 'flex', gap: 16, justifyContent: 'center', margin: '16px 0', flexWrap: 'wrap' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--muted)' }}><Icon name="checkCircle" size={16} color="var(--green)" /> Done for you</div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--muted)' }}><Icon name="checkCircle" size={16} color="var(--green)" /> 48-hour delivery</div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--muted)' }}><Icon name="checkCircle" size={16} color="var(--green)" /> Money-back guarantee</div>
                    </div>
                    <button className="blueprint-button" onClick={() => window.open('https://theautobotics.com/blueprint', '_blank')}>
                      Get Your Automation Blueprint — $197
                    </button>
                  </div>
                </div>
              )}

              <div className="results-footer">
                <a className="start-over-link" onClick={handleStartOver} role="button">Start Over</a>
                <span style={{ margin: '0 8px' }}>·</span>
                <span>Autobotics Operator's Toolkit</span>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
